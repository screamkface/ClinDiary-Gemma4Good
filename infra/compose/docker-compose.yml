services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: clindiary
      POSTGRES_USER: clindiary
      POSTGRES_PASSWORD: clindiary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clindiary -d clindiary"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done; mc mb -p local/clindiary || true; mc anonymous set private local/clindiary || true

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      args:
        INSTALL_OCR: ${INSTALL_OCR:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_NAME: ClinDiary API
      ENVIRONMENT: development
      DEBUG: "true"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://clindiary:clindiary@postgres:5432/clindiary
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: clindiary-development-secret-key-please-change
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_TTL_MINUTES: 15
      REFRESH_TOKEN_TTL_DAYS: 30
      PASSWORD_RESET_TTL_MINUTES: 30
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080,http://localhost:5000
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: clindiary
      MINIO_SECURE: "false"
      STORAGE_BACKEND: minio
      DOCUMENT_MAX_SIZE_MB: 20
      VIEWER_URL_TTL_MINUTES: 15
      AI_PROVIDER: ${AI_PROVIDER:-rule_based}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-clindiary-safe-summary}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-60}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.1}
      AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-500}
      DOCUMENT_ANSWER_MODEL_NAME: ${DOCUMENT_ANSWER_MODEL_NAME:-qwen3-8b}
      DOCUMENT_EMBEDDING_MODEL_NAME: ${DOCUMENT_EMBEDDING_MODEL_NAME:-qwen3-embedding-8b}
      DOCUMENT_EMBEDDING_DIMENSIONS: ${DOCUMENT_EMBEDDING_DIMENSIONS:-1024}
      DOCUMENT_RERANKER_MODEL_NAME: ${DOCUMENT_RERANKER_MODEL_NAME:-qwen3-reranker-4b}
      DOCUMENT_CHUNK_SIZE_CHARS: ${DOCUMENT_CHUNK_SIZE_CHARS:-1200}
      DOCUMENT_CHUNK_OVERLAP_CHARS: ${DOCUMENT_CHUNK_OVERLAP_CHARS:-200}
      DOCUMENT_CANDIDATE_LIMIT: ${DOCUMENT_CANDIDATE_LIMIT:-48}
      DOCUMENT_RERANK_TOP_N: ${DOCUMENT_RERANK_TOP_N:-10}
      DOCUMENT_ANSWER_TOP_N: ${DOCUMENT_ANSWER_TOP_N:-6}
      OCR_PROVIDER: ${OCR_PROVIDER:-paddleocr}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-it}
      OCR_USE_GPU: ${OCR_USE_GPU:-false}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-8}
      OCR_FALLBACK_TO_PENDING: ${OCR_FALLBACK_TO_PENDING:-true}
      CELERY_TASK_ALWAYS_EAGER: "false"
      CELERY_TASK_EAGER_PROPAGATES: "false"
      NOTIFICATION_SYNC_INTERVAL_MINUTES: 15
      PASSWORD_RESET_PREVIEW_ENABLED: "true"
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_BACKEND: redis
      RATE_LIMIT_AUTH_REQUESTS: 30
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_PREFIX: clindiary-rate-limit
      NOTIFICATION_PUSH_PROVIDER: log_only
      NOTIFICATION_EMAIL_PROVIDER: log_only
      NOTIFICATION_EMAIL_FROM: no-reply@clindiary.local
    ports:
      - "8000:8000"
    command: >
      /bin/sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      args:
        INSTALL_OCR: ${INSTALL_OCR:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_NAME: ClinDiary API
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://clindiary:clindiary@postgres:5432/clindiary
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: clindiary-development-secret-key-please-change
      API_V1_PREFIX: /api/v1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: clindiary
      MINIO_SECURE: "false"
      STORAGE_BACKEND: minio
      DOCUMENT_MAX_SIZE_MB: 20
      VIEWER_URL_TTL_MINUTES: 15
      AI_PROVIDER: ${AI_PROVIDER:-rule_based}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-clindiary-safe-summary}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-60}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.1}
      AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-500}
      DOCUMENT_ANSWER_MODEL_NAME: ${DOCUMENT_ANSWER_MODEL_NAME:-qwen3-8b}
      DOCUMENT_EMBEDDING_MODEL_NAME: ${DOCUMENT_EMBEDDING_MODEL_NAME:-qwen3-embedding-8b}
      DOCUMENT_EMBEDDING_DIMENSIONS: ${DOCUMENT_EMBEDDING_DIMENSIONS:-1024}
      DOCUMENT_RERANKER_MODEL_NAME: ${DOCUMENT_RERANKER_MODEL_NAME:-qwen3-reranker-4b}
      DOCUMENT_CHUNK_SIZE_CHARS: ${DOCUMENT_CHUNK_SIZE_CHARS:-1200}
      DOCUMENT_CHUNK_OVERLAP_CHARS: ${DOCUMENT_CHUNK_OVERLAP_CHARS:-200}
      DOCUMENT_CANDIDATE_LIMIT: ${DOCUMENT_CANDIDATE_LIMIT:-48}
      DOCUMENT_RERANK_TOP_N: ${DOCUMENT_RERANK_TOP_N:-10}
      DOCUMENT_ANSWER_TOP_N: ${DOCUMENT_ANSWER_TOP_N:-6}
      OCR_PROVIDER: ${OCR_PROVIDER:-paddleocr}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-it}
      OCR_USE_GPU: ${OCR_USE_GPU:-false}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-8}
      OCR_FALLBACK_TO_PENDING: ${OCR_FALLBACK_TO_PENDING:-true}
      NOTIFICATION_SYNC_INTERVAL_MINUTES: 15
      NOTIFICATION_PUSH_PROVIDER: log_only
      NOTIFICATION_EMAIL_PROVIDER: log_only
      NOTIFICATION_EMAIL_FROM: no-reply@clindiary.local
    command: >
      celery -A app.workers.celery_app.celery_app worker --loglevel=info

  beat:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      args:
        INSTALL_OCR: ${INSTALL_OCR_BEAT:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_NAME: ClinDiary API
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://clindiary:clindiary@postgres:5432/clindiary
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: clindiary-development-secret-key-please-change
      API_V1_PREFIX: /api/v1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: clindiary
      MINIO_SECURE: "false"
      STORAGE_BACKEND: minio
      DOCUMENT_MAX_SIZE_MB: 20
      VIEWER_URL_TTL_MINUTES: 15
      AI_PROVIDER: ${AI_PROVIDER:-rule_based}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-clindiary-safe-summary}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-60}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.1}
      AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-500}
      DOCUMENT_ANSWER_MODEL_NAME: ${DOCUMENT_ANSWER_MODEL_NAME:-qwen3-8b}
      DOCUMENT_EMBEDDING_MODEL_NAME: ${DOCUMENT_EMBEDDING_MODEL_NAME:-qwen3-embedding-8b}
      DOCUMENT_EMBEDDING_DIMENSIONS: ${DOCUMENT_EMBEDDING_DIMENSIONS:-1024}
      DOCUMENT_RERANKER_MODEL_NAME: ${DOCUMENT_RERANKER_MODEL_NAME:-qwen3-reranker-4b}
      DOCUMENT_CHUNK_SIZE_CHARS: ${DOCUMENT_CHUNK_SIZE_CHARS:-1200}
      DOCUMENT_CHUNK_OVERLAP_CHARS: ${DOCUMENT_CHUNK_OVERLAP_CHARS:-200}
      DOCUMENT_CANDIDATE_LIMIT: ${DOCUMENT_CANDIDATE_LIMIT:-48}
      DOCUMENT_RERANK_TOP_N: ${DOCUMENT_RERANK_TOP_N:-10}
      DOCUMENT_ANSWER_TOP_N: ${DOCUMENT_ANSWER_TOP_N:-6}
      OCR_PROVIDER: ${OCR_PROVIDER:-paddleocr}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-it}
      OCR_USE_GPU: ${OCR_USE_GPU:-false}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-8}
      OCR_FALLBACK_TO_PENDING: ${OCR_FALLBACK_TO_PENDING:-true}
      NOTIFICATION_SYNC_INTERVAL_MINUTES: 15
      NOTIFICATION_PUSH_PROVIDER: log_only
      NOTIFICATION_EMAIL_PROVIDER: log_only
      NOTIFICATION_EMAIL_FROM: no-reply@clindiary.local
    command: >
      celery -A app.workers.celery_app.celery_app beat --loglevel=info

volumes:
  postgres_data:
  minio_data:
