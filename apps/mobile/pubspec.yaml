name: clindiary
description: "ClinDiary mobile app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  cryptography: ^2.7.0
  drift: ^2.28.1
  file_picker: ^10.3.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^20.1.0
  flutter_pdf_text: ^0.9.0
  flutter_riverpod: ^2.6.1
