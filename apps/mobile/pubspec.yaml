  flutter_timezone: ^5.0.2
  go_router: ^14.8.1
  health: ^13.3.1
  http: ^1.5.0
  http_parser: ^4.1.2
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  speech_to_text: ^7.3.0
  share_plus: ^11.1.0
  sqlite3_flutter_libs: ^0.5.32
  timezone: ^0.10.1
  table_calendar: ^3.2.0
